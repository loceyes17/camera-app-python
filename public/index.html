<!DOCTYPE html>
<html>
<head>
    <title>Lorex Smart Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; min-height: 100vh; }
        header { padding: 20px; background: linear-gradient(135deg, #16213e, #0f3460); }
        h1 { font-size: 2rem; color: #00d4ff; margin-bottom: 10px; }
        .status-bar { padding: 10px 20px; background: rgba(0, 212, 255, 0.1); border-radius: 8px; border: 1px solid rgba(0, 212, 255, 0.3); }
        #video-container { width: 80%; margin: 20px auto; border: 5px solid #16213e; border-radius: 15px; overflow: hidden; position: relative; background: #000; }
        video { width: 100%; display: block; }
        .alert-banner { display: none; position: fixed; top: 0; width: 100%; background: #e94560; color: white; padding: 20px; font-size: 28px; font-weight: bold; text-align: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(233,69,96,0.5); animation: slide-down 0.3s ease; }
        @keyframes slide-down { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .controls { margin-top: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; background: #0f3460; color: #00d4ff; margin: 5px; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
    </style>
</head>
<body>
    <header>
        <h1>📹 Lorex Smart Dashboard</h1>
        <div class="status-bar">IP: 192.158.5.47 | Status: Online</div>
    </header>

    <div id="ring-alert" class="alert-banner">🔔 SOMEONE IS AT THE DOOR! <span id="ring-time"></span></div>

    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <div class="controls">
        <button onclick="captureSnapshot()">📸 Capture Snapshot</button>
        <button onclick="refreshStream()">🔄 Refresh Stream</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const hlsSource = '/static/hls/stream.m3u8';
        const socket = io();

        // Setup HLS player
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(hlsSource);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = hlsSource;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }

        // Handle doorbell ring
        socket.on('doorbell_ring', (data) => {
            const banner = document.getElementById('ring-alert');
            const timeSpan = document.getElementById('ring-time');
            timeSpan.textContent = data.time;
            banner.style.display = 'block';
            
            // Play doorbell chime
            const chime = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-doorbell-tone-285.mp3');
            chime.play().catch(e => console.log('Audio autoplay blocked'));

            setTimeout(() => { banner.style.display = 'none'; }, 10000);
        });

        // Capture snapshot via API
        async function captureSnapshot() {
            const response = await fetch('/api/snapshot');
            const data = await response.json();
            if (data.base64) {
                // Could download or display snapshot here
                alert('Snapshot captured! Check events folder.');
            }
        }

        // Refresh stream
        function refreshStream() {
            video.src = hlsSource;
        }

        // Auto-refresh every 30 seconds for stability
        setInterval(refreshStream, 30000);
    </script>
</body>
</html>
